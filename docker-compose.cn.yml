# Docker Compose override for China network environment
# This file overrides image sources to use Alibaba Cloud Container Registry (ACR)
# for faster image pulling in mainland China.
#
# Usage: ./roadfx.sh install --cn
#
# This file is part of the project and can be manually edited if needed.

name: roadfx-suite

services:
  # Infrastructure services - using Alibaba Cloud mirrors
  postgres:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/pgvector:pg16

  redis:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/redis:7-alpine

  # wukongim
  wukongim:
    image: registry.cn-shanghai.aliyuncs.com/wukongim/wukongim:v2.2.5-20260422

  # ROADFX application services - using Alibaba Cloud ACR
  roadfx-rag-worker:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-rag:latest

  roadfx-rag-beat:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-rag:latest

  roadfx-celery-flower:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/flower:2.0

  roadfx-rag:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-rag:latest

  roadfx-ai:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-ai:latest

  roadfx-api:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-api:latest

  roadfx-plugin-runtime:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-plugin-runtime:latest

  roadfx-device-control:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-device-control:latest
    
  roadfx-platform:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-platform:latest

  roadfx-workflow:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-workflow:latest

  roadfx-workflow-worker:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-workflow:latest

  roadfx-web:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-web:latest

  roadfx-widget-js:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/roadfx-widget-js:latest

  # Nginx and Certbot services - using Alibaba Cloud mirrors
  nginx:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/nginx:alpine

  certbot:
    image: registry.cn-shanghai.aliyuncs.com/ivansslo/certbot:latest

