name: roadfx-suite

services:
  # Postgres with pgvector extension for RAG
  postgres:
    image: pgvector/pgvector:pg16
    container_name: roadfx-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roadfx}
      POSTGRES_USER: ${POSTGRES_USER:-roadfx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadfx}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: roadfx-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # WuKongIM service
  wukongim:
    image: ghcr.io/wukongim/wukongim:v2.2.5-20260422
    container_name: roadfx-wukongim
    env_file:
      - .env
    environment:
      # WuKongIM cluster configuration (internal, fixed)
      WK_CLUSTER_NODEID: 1001
      WK_CLUSTER_SERVERADDR: wukongim:11110
      WK_CLUSTER_APIURL: http://wukongim:5001
      WK_INTRANET_TCPADDR: wukongim:5100
      WK_MODE: release
      WK_EXTERNAL_IP: ${SERVER_HOST:-127.0.0.1}
      WK_EXTERNAL_WSADDR: ${WK_EXTERNAL_WSADDR:-}
      WK_EXTERNAL_WSSADDR: ${WK_EXTERNAL_WSSADDR:-}
      WK_TOKENAUTHON: ${WK_TOKENAUTHON:-false}
      WK_WEBHOOK_HTTPADDR: http://roadfx-api:8000/v1/integrations/wukongim/webhook
    volumes:
      - ./data/wukongim:/root/wukongim
    ports:
      - "5100:5100"   # tcp
      - "5200:5200"   # websocket
      - "5300:5300"   # admin
    healthcheck:
      test: ["CMD-SHELL", "wget -q -Y off -O /dev/null http://localhost:5001/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: always

  # Shared Celery Flower (Monitoring for all services)
  roadfx-celery-flower:
    image: mher/flower:2.0
    container_name: roadfx-celery-flower
    env_file:
      - .env
    environment:
      # Celery uses Redis DB 2
      CELERY_BROKER_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      CELERY_RESULT_BACKEND: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5555/healthcheck || exit 1"]
    restart: unless-stopped

  # RAG Celery worker
  roadfx-rag-worker:
    image: ghcr.io/ivansslo/roadfx/roadfx-rag:latest
    build:
      context: ./repos/roadfx-rag
    container_name: roadfx-rag-worker
    hostname: roadfx-rag-worker
    env_file:
      - .env
    environment:
      # Service-specific: port and Redis DB
      PORT: 8082
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
    volumes:
      - ./data/roadfx-rag/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      roadfx-rag:
        condition: service_started
    command: >
      sh -c "celery -A src.rag_service.tasks.celery_app worker --loglevel=info --hostname=worker@roadfx-rag-worker -Q document_processing,embedding,website_crawling,qa_processing,celery"
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.rag_service.tasks.celery_app inspect ping -d worker@roadfx-rag-worker --timeout=10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # RAG Celery beat (scheduler)
  roadfx-rag-beat:
    image: ghcr.io/ivansslo/roadfx/roadfx-rag:latest
    build:
      context: ./repos/roadfx-rag
    container_name: roadfx-rag-beat
    env_file:
      - .env
    environment:
      # Service-specific: port and Redis DB
      PORT: 8082
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      roadfx-rag:
        condition: service_started
    command: >
      sh -c "celery -A src.rag_service.tasks.celery_app beat --loglevel=info"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # RAG service
  roadfx-rag:
    image: ghcr.io/ivansslo/roadfx/roadfx-rag:latest
    build:
      context: ./repos/roadfx-rag
    container_name: roadfx-rag
    env_file:
      - .env
    environment:
      # Service-specific: port and Redis DB
      PORT: 8082
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data/roadfx-rag/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # AI service
  roadfx-ai:
    image: ghcr.io/ivansslo/roadfx/roadfx-ai:latest
    build:
      context: ./repos/roadfx-ai
    container_name: roadfx-ai
    env_file:
      - .env
    environment:
      # Service-specific: port and Redis DB
      PORT: 8081
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      # Internal service URLs (fixed, not user-configurable)
      API_SERVICE_URL: http://roadfx-api:8000
      API_INTERNAL_SERVICE_URL: http://roadfx-api:8001
      RAG_SERVICE_URL: http://roadfx-rag:8082
      WORKFLOW_SERVICE_URL: http://roadfx-workflow:8000
      PLUGIN_RUNTIME_URL: http://roadfx-plugin-runtime:8090
      DEVICE_CONTROL_SERVICE_URL: http://roadfx-device-control:8085
      SKILLS_BASE_DIR: /data/skills
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      roadfx-rag:
        condition: service_started
    volumes:
      - ./data/skills:/data/skills
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Plugin Runtime service
  roadfx-plugin-runtime:
    image: ghcr.io/ivansslo/roadfx/roadfx-plugin-runtime:latest
    build:
      context: ./repos/roadfx-plugin-runtime
    container_name: roadfx-plugin-runtime
    env_file:
      - .env
    environment:
      # Service-specific: port
      PORT: 8090
      PLUGIN_TCP_PORT: 8005
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      # Internal service URL
      AI_SERVICE_URL: http://roadfx-ai:8081
    depends_on:
      - roadfx-ai
      - postgres
    ports:
      - "8005:8005" # TCP port for local plugin debugging
    volumes:
      - ./data/plugins:/var/lib/roadfx/plugins
      - plugin-socket:/var/run/roadfx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Device Control service (for AI agent remote device control)
  roadfx-device-control:
    image: ghcr.io/ivansslo/roadfx/roadfx-device-control:latest
    build:
      context: ./repos/roadfx-device-control
    container_name: roadfx-device-control
    env_file:
      - .env
    environment:
      # Service-specific: port
      PORT: 8085
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/3
      # Internal service URLs
      AI_SERVICE_URL: http://roadfx-ai:8081
      API_SERVICE_URL: http://roadfx-api:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      roadfx-ai:
        condition: service_started
    volumes:
      - ./data/roadfx-device-control/screenshots:/var/lib/roadfx/device-control/screenshots
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8085/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # API service
  roadfx-api:
    image: ghcr.io/ivansslo/roadfx/roadfx-api:latest
    build:
      context: ./repos/roadfx-api
    container_name: roadfx-api
    env_file:
      - .env
    depends_on:
      - roadfx-ai
      - roadfx-workflow
      - roadfx-plugin-runtime
      - roadfx-device-control
      - postgres
      - redis
    environment:
      # Service-specific: port and Redis DB
      PORT: 8000
      INTERNAL_SERVICE_HOST: 0.0.0.0
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
      # Internal service URLs (fixed, not user-configurable)
      PLATFORM_SERVICE_URL: http://roadfx-platform:8003
      PLATFORM_SERVICE_TIMEOUT: 30
      AI_SERVICE_URL: http://roadfx-ai:8081
      AI_SERVICE_TIMEOUT: 30
      RAG_SERVICE_URL: http://roadfx-rag:8082
      RAG_SERVICE_TIMEOUT: 30
      PLUGIN_RUNTIME_URL: http://roadfx-plugin-runtime:8090
      DEVICE_CONTROL_SERVICE_URL: http://roadfx-device-control:8085
      DEVICE_CONTROL_SERVICE_TIMEOUT: 60
      WORKFLOW_SERVICE_URL: http://roadfx-workflow:8000
      WORKFLOW_SERVICE_TIMEOUT: 60
      WUKONGIM_SERVICE_URL: http://wukongim:5001
      WUKONGIM_SERVICE_TIMEOUT: 10
      WUKONGIM_ENABLED: "true"
      WUKONGIM_DEVICE_FLAG: 1
      WUKONGIM_DEVICE_LEVEL: 1
    volumes:
      - ./data/roadfx-api/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Platform service
  roadfx-platform:
    image: ghcr.io/ivansslo/roadfx/roadfx-platform:latest
    build:
      context: ./repos/roadfx-platform
    container_name: roadfx-platform
    env_file:
      - .env
    environment:
      # Service-specific: port
      PORT: 8003
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      API_BASE_URL: http://roadfx-api:8000
      SSE_BACKPRESSURE_LIMIT: 1000
      REQUEST_TIMEOUT_SECONDS: 120
    depends_on:
      - roadfx-api
      - postgres
      - redis
      - wukongim
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Workflow service
  roadfx-workflow:
    image: ghcr.io/ivansslo/roadfx/roadfx-workflow:latest
    build:
      context: ./repos/roadfx-workflow
    container_name: roadfx-workflow
    env_file:
      - .env
    environment:
      # Service-specific: Redis DB (port 8000 same as API but different service)
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      AI_SERVICE_URL: http://roadfx-ai:8081
      ALLOWED_ORIGINS: '["*"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Workflow Celery worker
  roadfx-workflow-worker:
    image: ghcr.io/ivansslo/roadfx/roadfx-workflow:latest
    build:
      context: ./repos/roadfx-workflow
    container_name: roadfx-workflow-worker
    env_file:
      - .env
    environment:
      # Service-specific: Redis DB
      REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadfx}:${POSTGRES_PASSWORD:-roadfx}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-roadfx}
      AI_SERVICE_URL: http://roadfx-ai:8081
      ALLOWED_ORIGINS: '["*"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      roadfx-workflow:
        condition: service_started
    command: >
      sh -c "celery -A celery_app.celery worker --loglevel=info -Q workflow"
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/celery -A celery_app.celery inspect ping -d \"celery@$$(hostname)\" --timeout=10 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Customer service web (React build -> nginx)
  roadfx-web:
    image: ghcr.io/ivansslo/roadfx/roadfx-web:latest
    build:
      context: ./repos/roadfx-web
    container_name: roadfx-web
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Widget app (React build -> nginx)
  roadfx-widget-js:
    image: ghcr.io/ivansslo/roadfx/roadfx-widget-js:latest
    build:
      context: ./repos/roadfx-widget-js
    container_name: roadfx-widget-js
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Nginx Reverse Proxy for Domain and SSL Management
  nginx:
    image: nginx:alpine
    container_name: roadfx-nginx
    env_file:
      - .env
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./data/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/nginx/ssl:/etc/nginx/ssl:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - roadfx-web
      - roadfx-widget-js
      - roadfx-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Certbot for Let's Encrypt certificate management
  certbot:
    image: certbot/certbot:latest
    container_name: roadfx-certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/logs:/var/log/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    profiles:
      - ssl-auto

volumes:
  plugin-socket:
  roadfx-web-node-modules:
  roadfx-widget-node-modules:
