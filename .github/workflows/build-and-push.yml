name: Build and push service images

on:
  push:
    tags:
      - 'v*'
      - 'roadfx-*-v*'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated). Example: roadfx-api,roadfx-web'
        required: false
        default: ''
      push_latest:
        description: 'Push latest tag?'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  discover-services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.discover.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover services
        id: discover
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.services }}" ]; then
            services=$(echo "${{ github.event.inputs.services }}" | tr ',' '\n' | xargs)
            json=$(echo $services | jq -R -s -c 'split("\n") | map(select(. != ""))')
            echo "services=$json" >> $GITHUB_OUTPUT
            exit 0
          fi

          tag="${{ github.ref_name }}"
          if [[ $tag =~ ^(roadfx-[a-z0-9-]+)-v ]]; then
            echo "services=[\"${BASH_REMATCH[1]}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi

          services=()
          for dir in repos/*/; do
            name=$(basename "$dir")
            [ "$name" = "roadfx-rag" ] && continue
            [ -f "repos/$name/Dockerfile" ] && services+=("$name")
          done

          json=$(printf '%s\n' "${services[@]}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "services=$json" >> $GITHUB_OUTPUT

  build-and-push:
    needs: discover-services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover-services.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          SERVICE="${{ matrix.service }}"
          VERSION="${{ github.ref_name }}"
          TAGS="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${SERVICE}:${VERSION}"
          TAGS="${TAGS},ivansslo/${SERVICE}:${VERSION}"

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.push_latest }}" == "true" ]; then
            TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${SERVICE}:latest"
            TAGS="${TAGS},ivansslo/${SERVICE}:latest"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./repos/${{ matrix.service }}
          file: ./repos/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
